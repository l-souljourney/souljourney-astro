name: Deploy to COS + CDN

on:
  workflow_dispatch:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Write build metadata
        run: |
          cat > dist/build-meta.json <<EOF
          {
            "commit_sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "build_time_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "✅ build-meta.json generated"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy-cos:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate COS secrets
        run: |
          if [ -z "${{ secrets.TENCENT_CLOUD_SECRET_ID }}" ] || [ -z "${{ secrets.TENCENT_CLOUD_SECRET_KEY }}" ] || [ -z "${{ secrets.COS_BUCKET }}" ] || [ -z "${{ secrets.COS_REGION }}" ]; then
            echo "❌ COS secrets are incomplete"
            exit 1
          fi
          echo "✅ COS secrets check passed"

      - name: Deploy to COS via coscli
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ dist directory not found"
            exit 1
          fi
          echo "✅ dist exists: $(du -sh dist/ | cut -f1)"

          COS_ENDPOINT="cos.${COS_REGION}.myqcloud.com"
          echo "📦 COS endpoint: ${COS_ENDPOINT}"
          START_TS=$(date +%s)

          docker run --rm \
            -v "$PWD/dist:/workspace/dist" \
            --entrypoint /bin/sh \
            tencentcom/coscli:latest \
            -lc "
              coscli config set --secret_id \"${COS_SECRET_ID}\" --secret_key \"${COS_SECRET_KEY}\" &&
              coscli config add --init-skip=true -b \"${COS_BUCKET}\" -r \"${COS_REGION}\" &&
              coscli sync /workspace/dist/ \"cos://${COS_BUCKET}/\" --delete --force --disable-crc64 --recursive --endpoint \"${COS_ENDPOINT}\"
            "

          END_TS=$(date +%s)
          echo "⏱️ COS sync duration: $((END_TS - START_TS))s"

      - name: Purge CDN cache (optional)
        env:
          TEO_ZONE_ID: ${{ secrets.TEO_ZONE_ID }}
          TEO_PURGE_ENDPOINT: ${{ secrets.TEO_PURGE_ENDPOINT }}
          TEO_PURGE_TOKEN: ${{ secrets.TEO_PURGE_TOKEN }}
          CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "${TEO_ZONE_ID}" ] && [ -n "${TEO_PURGE_ENDPOINT}" ] && [ -n "${TEO_PURGE_TOKEN}" ]; then
            echo "🔄 Purging Tencent EdgeOne cache"
            curl --fail --silent --show-error -X POST "${TEO_PURGE_ENDPOINT}" \
              -H "Authorization: Bearer ${TEO_PURGE_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"zone_id\":\"${TEO_ZONE_ID}\",\"purge_all\":true}"
            echo "✅ Tencent EdgeOne cache purge submitted"
          elif [ -n "${CDN_DOMAIN}" ] && [ -n "${CLOUDFLARE_ZONE_ID}" ] && [ -n "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "🔄 Purging Cloudflare cache"
            curl --fail --silent --show-error -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"hosts\":[\"${CDN_DOMAIN}\"]}"
            echo "✅ Cloudflare cache purge submitted"
          else
            echo "⚠️ CDN purge skipped: missing TEO or Cloudflare purge config"
          fi

      - name: Show deployment info
        run: |
          echo "✅ COS deployment completed"
          if [ -n "${{ vars.PRIMARY_DOMAIN }}" ]; then
            echo "🌐 Primary domain: https://${{ vars.PRIMARY_DOMAIN }}"
          elif [ -n "${{ secrets.CDN_DOMAIN }}" ]; then
            echo "🌐 Primary domain (fallback): https://${{ secrets.CDN_DOMAIN }}"
          fi
          if [ -n "${{ vars.PAGES_DOMAIN }}" ]; then
            echo "🌍 Pages domain: https://${{ vars.PAGES_DOMAIN }}"
          fi

  verify-production:
    needs: deploy-cos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PRIMARY_DOMAIN: ${{ vars.PRIMARY_DOMAIN }}
      PAGES_DOMAIN: ${{ vars.PAGES_DOMAIN }}
      FALLBACK_CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
    steps:
      - name: Verify deployed commit on production domains
        run: |
          verify_domain() {
            local domain="$1"
            local label="$2"
            domain="${domain#http://}"
            domain="${domain#https://}"
            domain="${domain%/}"
            local url="https://${domain}/build-meta.json"

            if [ -z "${domain}" ]; then
              echo "⚠️ ${label} is empty, skip verification"
              return 0
            fi

            echo "🔎 Verifying ${label}: ${url}"
            for i in $(seq 1 20); do
              body=$(curl --silent --show-error --fail --max-time 10 "${url}" || true)
              if echo "${body}" | grep -q "\"commit_sha\"[[:space:]]*:[[:space:]]*\"${GITHUB_SHA}\""; then
                echo "✅ ${label} is serving commit ${GITHUB_SHA}"
                return 0
              fi

              echo "⏳ ${label} not updated yet (attempt ${i}/20), retry in 15s"
              sleep 15
            done

            echo "❌ ${label} verification failed: expected commit ${GITHUB_SHA}"
            return 1
          }

          EFFECTIVE_PRIMARY_DOMAIN="${PRIMARY_DOMAIN}"
          if [ -z "${EFFECTIVE_PRIMARY_DOMAIN}" ] && [ -n "${FALLBACK_CDN_DOMAIN}" ]; then
            EFFECTIVE_PRIMARY_DOMAIN="${FALLBACK_CDN_DOMAIN}"
            echo "ℹ️ Using fallback primary domain from CDN_DOMAIN secret"
          fi

          verify_domain "${EFFECTIVE_PRIMARY_DOMAIN}" "Primary domain"
          verify_domain "${PAGES_DOMAIN}" "Cloudflare Pages domain"
