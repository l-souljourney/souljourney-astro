name: Build + Sync to CNB

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  CNB_MIRROR_REPO_URL: https://cnb.cool/l-souljourney/souljourney-astro.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish health guard
        env:
          MIN_MIRROR_PAIRS: "2"
          MIN_ARTICLE_ROUTES: "4"
          MIN_RSS_ITEMS: "4"
          MAX_DUPLICATE_IDS: "0"
        run: pnpm check:publish-health

  sync-cnb:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate CNB sync secret
        run: |
          if [ -z "${{ secrets.CNB_TOKEN }}" ]; then
            echo "❌ missing secret: CNB_TOKEN"
            exit 1
          fi
          echo "✅ CNB_TOKEN is configured"

      - name: Sync repository to CNB mirror
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: ${{ env.CNB_MIRROR_REPO_URL }}
          PLUGIN_AUTH_TYPE: https
          PLUGIN_BRANCH: main
          PLUGIN_USERNAME: cnb
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_SYNC_MODE: rebase
          PLUGIN_FORCE: "true"

      - name: Show sync target
        run: |
          echo "✅ Synced current main to CNB mirror"
          echo "🔁 Target: ${CNB_MIRROR_REPO_URL}"
